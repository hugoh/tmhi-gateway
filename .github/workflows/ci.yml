---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  hk:
    uses: hugoh/go-tools/.github/workflows/go-hk.yml@d0950df1fd8fe2844eb64b0a119d3e6b5c0c48f7
    permissions:
      contents: read

  goci:
    uses: hugoh/go-tools/.github/workflows/go-ci.yml@d0950df1fd8fe2844eb64b0a119d3e6b5c0c48f7
    permissions:
      contents: read
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
