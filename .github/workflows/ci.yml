---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  hk:
    uses: hugoh/go-tools/.github/workflows/go-hk.yml@49179620e3e259aa95794ad3c3c6051bcd8b8174
    permissions:
      contents: read

  goci:
    uses: hugoh/go-tools/.github/workflows/go-ci.yml@49179620e3e259aa95794ad3c3c6051bcd8b8174
    permissions:
      contents: read
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
