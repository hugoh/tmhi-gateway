[tools]
go = "1.26.2"
"go:github.com/vladopajic/go-test-coverage/v2" = "2.18.4"
golangci-lint = "2.11.4"
prettier = "3.8.1"

[env]
COVEROUT = "cover.out"

[tasks.lint]
description = "Lint code"
run = ["go mod tidy -diff", "golangci-lint run ./...", "prettier --check ."]

[tasks.test]
description = "Run tests"
run = "go test ./... -race -coverprofile=${COVEROUT} -covermode=atomic"

[tasks.coverage]
description = "Generate test coverage"
depends = ["test"]

[tasks.covercheck]
description = "Check test coverage"
depends = ["coverage"]
run = "go-test-coverage -config .testcoverage.yml"

[tasks.ci]
description = "Run CI checks (lint, test, coverage)"
depends = ["lint", "covercheck"]

[tasks.clean]
description = "Clean the project"
run = ["go clean", "rm -f ${COVEROUT}"]

[tasks.fix]
description = "Fix lint issues"
run = "golangci-lint run --fix ./..."

[tasks.format]
description = "Format the code"
run = ["golangci-lint fmt ./...", "prettier --write ."]

[tasks.tidy]
description = "Tidy the module"
run = "go mod tidy -v"

[tasks.depup]
description = "Upgrade dependencies"
run = ["go get -u -t ./...", "go mod tidy -v"]
